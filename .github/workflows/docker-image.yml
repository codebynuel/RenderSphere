name: Build and Push RunPod Worker

on:
  push:
    branches: [ "main" ] # Triggers the build whenever you push to the main branch

jobs:
  build:
    runs-on: ubuntu-latest # Bypasses Windows entirely!

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Log in to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Build and Push Docker Image
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        tags: ${{ secrets.DOCKERHUB_USERNAME }}/blender-runpod-worker:v4
