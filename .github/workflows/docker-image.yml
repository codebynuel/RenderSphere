name: Build Docker Images

on:
  workflow_dispatch:
  push:
    branches: ["main"]
    paths:
      - "Dockerfile"
      - "Dockerfile.web"
      - ".dockerignore"
      - "handler.py"
      - "server.js"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "prisma.config.ts"
      - "helpers/**"
      - "routes/**"
      - "src/**"
      - "prisma/**"
      - "scripts/**"
      - "extension/**"
      - "public/downloads/**"
      - "frontend/**"
      - "docs/production.md"
      - ".github/workflows/docker-image.yml"
  pull_request:
    paths:
      - "Dockerfile"
      - "Dockerfile.web"
      - ".dockerignore"
      - "handler.py"
      - "server.js"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "prisma.config.ts"
      - "helpers/**"
      - "routes/**"
      - "src/**"
      - "prisma/**"
      - "scripts/**"
      - "extension/**"
      - "public/downloads/**"
      - "frontend/**"
      - "docs/production.md"
      - ".github/workflows/docker-image.yml"

permissions:
  contents: read

jobs:
  backend-release-validation:
    name: Backend, Prisma, migrations, and smoke tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: rendersphere_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d rendersphere_ci"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/rendersphere_ci?schema=ci_migrate_${{ github.run_id }}_${{ github.run_attempt }}
      SMOKE_TEST_DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/rendersphere_ci?schema=smoke_${{ github.run_id }}_${{ github.run_attempt }}
      SMOKE_TEST_PORT: 3999
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Enable Corepack
        run: corepack enable

      - name: Install backend dependencies
        run: pnpm install --frozen-lockfile

      - name: Backend syntax/static validation
        run: pnpm lint:backend

      - name: Prisma validate and generate
        run: |
          pnpm prisma:validate
          pnpm db:generate

      - name: Verify isolated database targets
        run: pnpm db:check-isolated

      - name: Deploy migrations to disposable PostgreSQL schema
        run: pnpm db:deploy

      - name: Verify migration status
        run: pnpm db:status

      - name: Run isolated backend smoke tests
        run: pnpm test

  frontend-release-validation:
    name: Frontend lint and production build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Enable Corepack
        run: corepack enable

      - name: Install frontend dependencies
        run: pnpm --dir frontend install --frozen-lockfile

      - name: Frontend lint
        run: pnpm --dir frontend lint

      - name: Frontend production build
        run: pnpm --dir frontend build

  dependency-audit:
    name: Dependency audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Enable Corepack
        run: corepack enable

      - name: Install root dependencies
        run: pnpm install --frozen-lockfile

      - name: Install frontend dependencies
        run: pnpm --dir frontend install --frozen-lockfile

      - name: Root production dependency audit
        run: pnpm audit --prod --audit-level high

      - name: Frontend production dependency audit
        run: pnpm --config.ignore-workspace=true --dir frontend audit --prod --audit-level high

  extension-artifact-validation:
    name: Extension package and checksum validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Enable Corepack
        run: corepack enable

      - name: Install backend dependencies
        run: pnpm install --frozen-lockfile

      - name: Package extension and write checksums
        run: pnpm package:extension:verify
        env:
          SOURCE_DATE_EPOCH: 1704067200

      - name: Verify extension artifacts are committed and reproducible
        run: |
          pnpm checksums:extension:verify
          git diff --exit-code -- \
            public/downloads/rendersphere-blender-addon.zip \
            public/downloads/rendersphere-blender-addon.zip.sha256 \
            frontend/public/downloads/rendersphere-blender-addon.zip \
            frontend/public/downloads/rendersphere-blender-addon.zip.sha256

      - name: Upload extension artifacts
        uses: actions/upload-artifact@v4
        with:
          name: rendersphere-blender-addon
          if-no-files-found: error
          path: |
            public/downloads/rendersphere-blender-addon.zip
            public/downloads/rendersphere-blender-addon.zip.sha256
            frontend/public/downloads/rendersphere-blender-addon.zip
            frontend/public/downloads/rendersphere-blender-addon.zip.sha256

  web-image-validation:
    name: Validate web gateway image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Build Web Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.web
          push: false
          tags: rendersphere-web:${{ github.sha }}

  worker-image-validation:
    name: Validate RunPod worker image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Build Worker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: false
          tags: blender-runpod-worker:${{ github.sha }}

  worker:
    name: Build and push RunPod worker
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request'
    needs:
      - backend-release-validation
      - frontend-release-validation
      - dependency-audit
      - extension-artifact-validation
      - web-image-validation
      - worker-image-validation
    env:
      IMAGE_NAME: blender-runpod-worker

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Worker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
