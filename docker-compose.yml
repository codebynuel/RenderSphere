version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: rendersphere-postgres
    restart: always
    environment:
      POSTGRES_USER: rendersphere
      POSTGRES_PASSWORD: rendersphere_password
      POSTGRES_DB: rendersphere_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
