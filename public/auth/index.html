<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RenderSphere Auth</title>
    <link rel="stylesheet" href="/styles.css" />
</head>
<body>
    <div class="shell site-frame">
        <header class="nav">
            <a class="brand" href="/">RenderSphere</a>
            <div class="nav-actions">
                <span class="route-chip">/auth</span>
                <a class="link-button" href="/">Home</a>
            </div>
        </header>

        <main class="page">
            <section class="auth-layout">
                <div class="workbench">
                    <div>
                        <p class="eyebrow">RenderSphere account</p>
                        <h2 style="margin: 0; font-size: 32px; font-weight: 500; line-height: 1.1; color: var(--text);">Sign in and continue to your render dashboard.</h2>
                        <p class="lede">Use your account to manage access keys, submit renders from Blender, and track completed files.</p>
                    </div>
                    <div class="placeholder-shot" data-label="Account access"></div>
                </div>

                <aside class="panel auth-panel">
                    <div class="panel-head">
                        <div>
                            <h2 id="authTitle">Create account</h2>
                            <p class="muted">After sign in you will be taken to /app.</p>
                        </div>
                    </div>

                    <div class="tabs" role="tablist" aria-label="Authentication">
                        <button id="registerTab" class="tab active" type="button">Register</button>
                        <button id="loginTab" class="tab" type="button">Log in</button>
                    </div>

                    <form id="authForm" class="form">
                        <label>
                            Email
                            <input id="email" type="email" autocomplete="email" required />
                        </label>
                        <label>
                            Password
                            <input id="password" type="password" autocomplete="current-password" minlength="10" required />
                        </label>
                        <label id="inviteLabel" hidden>
                            Invite code
                            <input id="inviteCode" type="password" autocomplete="off" />
                        </label>
                        <button id="authSubmit" class="button primary" type="submit">Create account</button>
                        <div id="authStatus" class="status" role="status"></div>
                    </form>
                </aside>
            </section>
        </main>
    </div>

    <script>
        const state = {
            mode: 'register',
            config: null,
        };

        const els = {
            registerTab: document.querySelector('#registerTab'),
            loginTab: document.querySelector('#loginTab'),
            authTitle: document.querySelector('#authTitle'),
            authForm: document.querySelector('#authForm'),
            authSubmit: document.querySelector('#authSubmit'),
            authStatus: document.querySelector('#authStatus'),
            email: document.querySelector('#email'),
            password: document.querySelector('#password'),
            inviteLabel: document.querySelector('#inviteLabel'),
            inviteCode: document.querySelector('#inviteCode'),
        };

        function setStatus(message, isError = false) {
            els.authStatus.textContent = message || '';
            els.authStatus.classList.toggle('error', Boolean(isError));
        }

        async function api(path, options = {}) {
            const headers = { 'Content-Type': 'application/json', ...(options.headers || {}) };
            const response = await fetch(path, { ...options, headers, credentials: 'same-origin' });
            const data = await response.json().catch(() => ({}));
            if (!response.ok) throw new Error(data.error || 'Request failed');
            return data;
        }

        function setMode(mode) {
            state.mode = mode;
            const isRegister = mode === 'register';
            els.registerTab.classList.toggle('active', isRegister);
            els.loginTab.classList.toggle('active', !isRegister);
            els.authTitle.textContent = isRegister ? 'Create account' : 'Log in';
            els.authSubmit.textContent = isRegister ? 'Create account' : 'Log in';
            els.password.autocomplete = isRegister ? 'new-password' : 'current-password';
            els.inviteLabel.hidden = !(isRegister && state.config?.inviteRequired);
            els.inviteCode.required = isRegister && Boolean(state.config?.inviteRequired);
            setStatus('');
        }

        async function init() {
            try {
                await api('/api/auth/me');
                window.location.replace('/app');
                return;
            } catch {
                // Continue in signed-out state.
            }

            try {
                state.config = await api('/api/config');
            } catch {
                state.config = null;
            }

            setMode('register');
        }

        els.registerTab.addEventListener('click', () => setMode('register'));
        els.loginTab.addEventListener('click', () => setMode('login'));

        els.authForm.addEventListener('submit', async (event) => {
            event.preventDefault();
            setStatus(state.mode === 'register' ? 'Creating account...' : 'Signing in...');

            try {
                const body = {
                    email: els.email.value,
                    password: els.password.value,
                };

                if (state.mode === 'register' && state.config?.inviteRequired) {
                    body.inviteCode = els.inviteCode.value;
                }

                await api(`/api/auth/${state.mode}`, {
                    method: 'POST',
                    body: JSON.stringify(body),
                });

                window.location.replace('/app');
            } catch (error) {
                setStatus(error.message, true);
            }
        });

        init();
    </script>
</body>
</html>
